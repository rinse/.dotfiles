##
# Global settings
#
# * set is an alias for set-option
# * setw is an alias for set-window-option

# Enable mouse
set -g mouse off

# Scrolls with the mouse wheel
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Load .bashrc
set -g default-shell /bin/bash
set -g default-command /bin/bash

# History
set -g history-limit 50000

# Automatically set window title
set -g set-titles on
setw -g automatic-rename on

# Status bar settings
set -g status-position top
set -g status-bg black
set -g status-fg white
set -g status-right '#[fg=white]%F#[default] %H:%M:%S'
set -g status-interval 1

# Tmux setup
set -g base-index 1
set -g pane-active-border-style fg=red,bg=black
set -s escape-time 0 # Make Esc not being interpreted as a meta key

##
# Keybinds
#
# https://www.seanh.cc/2020/12/28/binding-keys-in-tmux/
#
# * -T specifies a key table
# * -n is a shortcut for -T root;
#   Binds a key without prefix.
# * -r means repeatable;
#   You can repeat the operation without another prefix
unbind-key -a

# Change the prefix to <C-k>
# * <C-t> collides with fzf
# * <C-m> sends Enter
unbind-key C-b
set -g prefix C-k
# Repeat to type the prefix
bind C-k send-prefix

# Reload config on <prefix>-r. \; is the separator
bind r source-file ~/.tmux.conf \; display "tmux configuration reloaded."
bind d detach-client
bind c new-window

# Keep the command prompt and the key listing available after unbind-key -a
bind : command-prompt
bind ? list-keys

# Splitting a window into panes
bind v split-window -h # vsp
bind s split-window -v # sp

bind-key j select-pane -t :.+
bind-key k select-pane -t :.-

# VI like keybinds on the copy mode
# Type <previx>-[ to enter to the copy mode
# - v to begin selection, <enter> to copy
# - <esc> to discard selection
# Type <prefix>-] to paste
setw -g mode-keys vi
bind -T prefix [ copy-mode
bind -T prefix ] paste-buffer -p
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi Enter

##
# XMonad key bindings

# (Mask-Return): Launch a new pane
# NOTE: XMonad launches a terminal on (Mask-Shift-Return), but tmux cannot
#       tell M-S-Enter from M-Enter, and our XMonad config leaves M-Enter
#       unbound anyway (removed for IntelliJ), so plain M-Enter is used here
bind-key -n M-Enter split-window \; select-layout

# (Mask-i): Swap focused pane and master pane, following M-i of our XMonad
#           config. -d keeps old focus
# NOTE: Assuming master pane is always index 0
bind-key -n M-i swap-pane -d -s 0

# Close focused pane
bind-key -n M-C kill-pane

# (Mask-Space): Toggle maximization the current pane
bind-key -n M-Space resize-pane -Z

# (Mask-j): Move to next pane
bind-key -n M-j select-pane -t :.+

# (Mask-k): Move to previous pane
bind-key -n M-k select-pane -t :.-

# (Mask-Shift-j): Swap focused pane with next pane
# NOTE: tmux does not support detecting Shift-j
bind-key -n M-J swap-pane -D

# (Mask-Shift-k): Swap focused pane with previous pane
# NOTE: tmux does not support detecting Shift-k
bind-key -n M-K swap-pane -U

# (Mask-l): Move to the next window
bind-key -n M-l next-window
bind n next-window

# (Mask-h): Move to the previous window
bind-key -n M-h previous-window
bind p previous-window

# (Mask-Shift-l): Move the focused window one position forward
# -d keeps the focused window selected after the swap.
bind-key -n M-L swap-window -d -t :+

# (Mask-Shift-h): Move the focused window one position backward
# -d keeps the focused window selected after the swap.
bind-key -n M-H swap-window -d -t :-

# (Mask-[1..9]): Switch to window N, creating it if it does not exist
#
# (Mask-Shift-[1..9]): Move pane to window N, creating it if it does not
#                      exist
# NOTE: Like XMonad, we do not switch to the new workspace, although this
#       will automatically happen if all panes are moved to the new window
# NOTE: The bindings are generated by a shell loop because tmux has no
#       loops. run-shell expands formats, so ## and ##{ below turn into
#       # and #{ in the generated bindings. set -f keeps * from globbing
run-shell 'set -f; keys="! @ ## $ % ^ & * ("; i=1; for key in $keys; do tmux bind-key -n "M-$i" run-shell "tmux select-window -t :$i || tmux new-window -t :$i"; tmux bind-key -n "M-$key" run-shell "[ ##{window_index} -eq $i ] || tmux join-pane -d -t :$i || tmux break-pane -d -t :$i"; i=$((i+1)); done'


# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (tmux plugin manager).
# Keep this line at the very bottom of tmux.conf.
run '~/.tmux/plugins/tpm/tpm'
